<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cricket Match Setup</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <div class="top-nav">
      <a href="index.html" class="btn-nav btn-home">🏠 Home</a>
      <span class="btn-nav active">⚙️ Match Setup</span>
    </div>
    <h1>Match Setup</h1>
    <div class="card">
      <div class="grid2">
        <div>
          <label for="teamAInput">Team A</label>
          <input type="text" id="teamAInput" class="player-input" value="Team A" />
        </div>
        <div>
          <label for="teamBInput">Team B</label>
          <input type="text" id="teamBInput" class="player-input" value="Team B" />
        </div>
      </div>
      <div style="margin-top:12px; text-align:center;" class="status">
        <span class="small">1st Batting: </span>
        <button id="firstBatA" class="btn-secondary">🏏 Team A</button>
        <button id="firstBatB" class="btn-secondary">🏏 Team B</button>
      </div>
      <div style="margin-top:16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <label for="scorerPassword">Scorer Password</label>
        <input type="text" id="scorerPassword" class="player-input" placeholder="Password for match scorer access" style="flex: 1; min-width:220px;" />
        <label for="viewerPassword">Viewer Password</label>
        <input type="text" id="viewerPassword" class="player-input" placeholder="Password for match viewers" style="flex: 1; min-width:220px;" />
      </div>
      <div style="margin-top:6px; color:#666; font-size:0.9em;">Required to access scoring controls and continue matches (scorer + viewer)</div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Players</h3>
      <div class="grid2" style="text-align:center;">
        <div>
          <h4 id="teamAHeader">Team A</h4>
          <div style="margin-bottom:8px;"><span id="teamAPlayerCount" class="small">11 players</span></div>
          <div id="teamAPlayers"></div>
          <div style="margin-top:8px; display:flex; justify-content:center; gap:8px;">
            <button type="button" id="teamAAdd" class="btn-secondary" style="padding:6px 10px;">+ Add player</button>
            <button type="button" id="teamARemove" class="btn-secondary" style="padding:6px 10px;">– Remove player</button>
          </div>
        </div>
        <div>
          <h4 id="teamBHeader">Team B</h4>
          <div style="margin-bottom:8px;"><span id="teamBPlayerCount" class="small">11 players</span></div>
          <div id="teamBPlayers"></div>
          <div style="margin-top:8px; display:flex; justify-content:center; gap:8px;">
            <button type="button" id="teamBAdd" class="btn-secondary" style="padding:6px 10px;">+ Add player</button>
            <button type="button" id="teamBRemove" class="btn-secondary" style="padding:6px 10px;">– Remove player</button>
          </div>
        </div>
      </div>
      <div style="margin-top:12px; text-align:center;">
        <button id="startBtn" class="btn-primary full-width" style="max-width:260px;">Start Match</button>
      </div>
    </div>
  </div>

  <script src="js/setup.js"></script>

  <footer style="text-align: center; padding: 20px; background: rgba(255,255,255,0.1); color: #666; margin-top: 40px;">
    <p>&copy; 2026 ANZAN. All rights reserved.</p>
  </footer>
</body>
</html>
